<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bellaveste</title>

    <link rel="icon" href="./images/color.jfif">
    <link rel="stylesheet" href="fontello/css/fontello.css">

    <link rel="stylesheet" href="css/comun.css">
    <link rel="stylesheet" href="css/registrar.css">
    <link rel="stylesheet" href="css/modal.css">
</head>

<body>
    <header class="barra-superior">
        <div class="marca">
            <h1>BELLAVESTE</h1>
            <p>SPAIN</p>
        </div>

        <div class="subtitulo">
            <h2>REGISTER AN ACCOUNT</h2>
        </div>
    </header>

    <main class="contenedor">
        <form class="formulario">
            <div class="campo">
                <label for="nombre">NAME</label>
                <input type="text" id="nombre" name="nombre" minlength="2" maxlength="60" required>
            </div>

            <div class="campo">
                <label for="username">USERNAME</label>
                <input type="text" id="username" name="username" minlength="3" maxlength="20" required>
            </div>

            <div class="campo">
                <label for="email">EMAIL</label>
                <input type="email" id="email" name="email" required>
            </div>

            <div class="campo">
                <label for="contrasena">PASSWORD</label>
                <input type="password" id="contrasena" name="contrasena" required>
            </div>

            <div class="campo">
                <label for="confirmar-contrasena">CONFIRM PASSWORD</label>
                <input type="password" id="confirmar-contrasena" name="confirmar-contrasena" required>
            </div>

            <button class="boton-registrar" type="submit">REGISTER</button>
        </form>

        <footer>
            <a class="boton-armario" href="#">VIRTUAL CLOSET</a>
        </footer>

    </main>

    <script type="module" src="js/registrar.js"></script>
</body>

</html>
