<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bellaveste</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600&family=Cormorant+Garamond:wght@400;500;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="css/inicio-logueado.css">
</head>

<body>

<main class="contenedor-app">

    <!-- ENCABEZADO -->
    <header class="barra-superior">
        <div class="fila-marca">

            <button class="boton-icono">☰</button>

            <div class="marca">
                <h1>BELLAVESTE</h1>
                <p>SPAIN</p>
            </div>

            <div class="iconos-acciones">
                <span>🔍</span>
                <span>👤</span>
            </div>

        </div>

        <div class="usuario-barra">
            <span class="nombre-usuario">MIRANDA WANDA</span>
            <img class="avatar" src="images/Tulipanes.jfif" alt="Usuario">
        </div>
    </header>

    <!-- COLECCIONES -->
    <section class="colecciones">
        <h2>COLECCIONES</h2>
        <p>DISCOVER FASHION YOUR WAY</p>

        <div class="categorias">
            <article class="categoria">
                <img src="images/fondo.jpg" alt="">
                <span>SEASON</span>
            </article>

            <article class="categoria">
                <img src="images/Tulipanes.jfif" alt="">
                <span>COLOR</span>
            </article>

            <article class="categoria">
                <img src="images/fondo-ord.jfif" alt="">
                <span>MOOD</span>
            </article>
        </div>
    </section>

    <!-- OUTFIT -->
    <section class="outfit-dia">
        <h2>OUTFIT</h2>
        <p>WHAT WILL YOU WEAR TODAY?</p>

        <article class="tarjeta-outfit">

            <div class="imagen-outfit">
                <img src="images/fondo-ord.jfif" alt="">
            </div>

            <div class="info-outfit">

                <h3>COFFEE CHIC</h3>

                <div class="mini-galeria">
                    <button>‹</button>
                    <img src="images/fondo.jpg" alt="">
                    <button>›</button>
                </div>

                <div class="etiquetas">
                    <span>AUTUMN</span>
                    <span>CASUAL</span>
                </div>

                <div class="autor">
                    <img src="images/Tulipanes.jfif" alt="">
                    <span>Carla García</span>
                </div>

            </div>

            <time class="fecha">12 de febrero de 2026</time>

        </article>

        <article class="tarjeta-outfit">

            <div class="imagen-outfit">
                <img src="images/fondo-ord.jfif" alt="">
            </div>

            <div class="info-outfit">

                <h3>COFFEE CHIC</h3>

                <div class="mini-galeria">
                    <button>‹</button>
                    <img src="images/fondo.jpg" alt="">
                    <button>›</button>
                </div>

                <div class="etiquetas">
                    <span>AUTUMN</span>
                    <span>CASUAL</span>
                </div>

                <div class="autor">
                    <img src="images/Tulipanes.jfif" alt="">
                    <span>Carla García</span>
                </div>

            </div>

            <time class="fecha">12 de febrero de 2026</time>

        </article>
    </section>

    <!-- BOTON FINAL -->
    <a class="boton-armario" href="#">VIRTUAL CLOSET</a>

</main>

</body>
</html>
