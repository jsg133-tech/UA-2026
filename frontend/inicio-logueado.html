<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bellaveste</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600&family=Cormorant+Garamond:wght@400;500;600;700&display=swap"
        rel="stylesheet">

    <link rel="stylesheet" href="css/inicio-logueado.css">
    <link rel="stylesheet" href="css/comun.css">
    <link rel="stylesheet" href="css/modal.css">
    <link rel="icon" href="./images/color.jfif">
    <link rel="stylesheet" href="fontello/css/fontello.css">

    <script type="module" src="js/inicio.js"></script>
</head>

<body>
    <!-- ENCABEZADO -->
    <header class="barra-superior">
        <div class="fila-marca">

            <nav>
                <label for="chkMenu"><i class="icon-menu"></i></label>
                <input type="checkbox" id="chkMenu">

                <ul id="menu">
                    <li><a href="./inicio-logueado.html"><i class="icon-home"></i>HOME</a></li>
                    <li><a href="./perfil.html"><i class="icon-login"></i>PROFILE</a></li>
                    <li><a href="./buscar.html"><i class="icon-search"></i>SEARCH</a></li>
                    <li><a href="./inicio-categoria.html"><i class="icon-plus"></i>COLLECTIONS</a></li>
                    <li><a href="./armario.html"><i class="icon-logout"></i>MY CLOSET</a></li>
                    <li><a href="./post.html"><i class="icon-plus"></i>POST</a></li>
                    <li><i class="icon-moon"></i>DARK MODE</li>
                    <li><i class="icon-setting"></i>SETTING</li>
                </ul>

            </nav>

            <div class="marca">
                <h1>BELLAVESTE</h1>
                <p>SPAIN</p>
            </div>

            <div class="iconos-acciones">
                <button class="boton-icono"><i class="icon-search"></i></button>
                <button class="boton-icono"><i class="icon-shopping-bag"></i></button>
            </div>
        </div>

        <div class="usuario-barra">
            <input type="checkbox" id="chkPerfil">

            <label for="chkPerfil" class="perfil-trigger">
                <span class="nombre-usuario" id="nombre-usuario">USUARIO</span>
                <img class="avatar" id="avatar-usuario" src="images/perfil.jfif" alt="Usuario">
            </label>

            <ul class="menu-perfil">
                <li><a href="./inicio.html" id="logout-link">LOGOUT</a></li>
            </ul>
        </div>
    </header>

    <main class="contenedor-app">
        <!-- COLECCIONES -->
        <section class="colecciones">
            <h2>COLECCIONES</h2>
            <p>DISCOVER FASHION YOUR WAY</p>

            <div class="categorias">
                <article class="categoria">
                    <img src="images/temporada.jfif" alt="">
                    <span>SEASON</span>
                </article>

                <article class="categoria">
                    <img src="images/color.jfif" alt="">
                    <span>COLOR</span>
                </article>

                <article class="categoria">
                    <img src="images/ocasion.jfif" alt="">
                    <span>MOOD</span>
                </article>
            </div>
        </section>

        <!-- OUTFIT -->
        <section class="outfit-dia">
            <h2>OUTFIT</h2>
            <p>WHAT WILL YOU WEAR TODAY?</p>
        </section>

        <!-- BOTON FINAL -->
        <footer>
            <a class="boton-armario" href="#">VIRTUAL CLOSET</a>
        </footer>

    </main>
</body>

</html>
