<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — Bellaveste</title>
  <link rel="icon" href="./images/color.jfif">
  <link rel="stylesheet" href="fontello/css/fontello.css">
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500&family=Cormorant+Garamond:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/login.css">
  <link rel="stylesheet" href="css/modal.css">
</head>
<body>
  <header class="barra-superior">
    <div class="marca">
      <h1>BELLAVESTE</h1>
      <p>SPAIN</p>
    </div>
    <div class="subtitulo">
      <h2>WELCOME BACK</h2>
    </div>
  </header>

  <main>
    <div class="contenedor">
      <form class="formulario" id="form-login" novalidate>
        <div class="campo">
          <label for="email">EMAIL</label>
          <input type="email" id="email" autocomplete="email" required>
        </div>
        <div class="campo">
          <label for="contrasena">PASSWORD</label>
          <input type="password" id="contrasena" autocomplete="current-password" required>
        </div>
        <button class="boton-login" type="submit" id="btn-login">LOGIN</button>
        <p class="enlace-registro">
          Don't have an account? <a href="registrar.html">Register here</a>
        </p>
      </form>
    </div>
  </main>

  <footer>
    <a class="boton-armario" href="inicio.html">VIRTUAL CLOSET</a>
  </footer>

  <script type="module" src="js/login.js"></script>
</body>
</html>
